name: clawtalk
description: "ClawTalk - OpenClaw Cross-platform Client"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Network
  web_socket_channel: ^3.0.0
  dio: ^5.5.0
  connectivity_plus: ^6.0.0

  # Media
  camera: ^0.11.0
  image_picker: ^1.1.0
  record: ^6.2.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Storage
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.3.0

  # Platform Services
  permission_handler: ^11.3.0
  flutter_local_notifications: ^17.0.0
  file_picker: ^8.0.0

  # UI
  cupertino_icons: ^1.0.8
  intl: ^0.20.2

  # Utils
  uuid: ^4.5.0
  logger: ^2.5.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  mocktail: ^1.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
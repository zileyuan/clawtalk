name: clawtalk
description: "ClawTalk - OpenClaw Cross-platform Client"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1

  # Network
  web_socket_channel: ^3.0.0
  dio: ^5.5.0
  connectivity_plus: ^7.0.0

  # Media
  camera: ^0.12.0
  image_picker: ^1.1.0
  record: ^6.2.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.0

  # Platform Services
  permission_handler: ^12.0.1
  flutter_local_notifications: ^21.0.0
  file_picker: ^10.3.10

  # UI
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  
  # Internationalization
  easy_localization: ^3.0.7+1

  # Utils
  uuid: ^4.5.0
  logger: ^2.5.0
  
  # Crypto
  ed25519_edwards: ^0.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.0
  integration_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: 'assets/icons/app_icon.png'
  adaptive_icon_background: '#FF8E53'
  adaptive_icon_foreground: 'assets/icons/app_icon.png'
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: false

  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/